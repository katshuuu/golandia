<title>Dashboard Layout</title>
  <link rel="stylesheet" href="global.css">
  <style id="sections-styles">
/* CSS for section section:Dashboard */
/* Layout Container */
.dashboard-container {
  display: flex;
  width: 100%;
  max-width: 1920px;
  min-height: 100vh;
  margin: 0 auto;
  background-color: #ffffff;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.05);
}

/* Sidebar Styles */
.sidebar {
  width: 213px;
  flex-shrink: 0;
  background: radial-gradient(circle at 50% 0%, rgba(183, 204, 229, 1) 0%, rgba(217, 239, 255, 0.57) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 214px;
  padding-bottom: 40px;
  z-index: 10;
}

.module-list {
  display: flex;
  flex-direction: column;
  gap: 23px;
  width: 100%;
  align-items: center;
}

.module-card {
  width: 179px;
  height: 86px;
  background-color: rgba(255, 255, 255, 0.81);
  border-radius: 21px;
  box-shadow: 0px 4px 11.1px 3px rgba(122, 180, 213, 0.36);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.module-card:hover {
  transform: translateY(-2px);
  box-shadow: 0px 6px 14px 4px rgba(122, 180, 213, 0.45);
}

.module-icon {
  width: 62px;
  height: 62px;
  object-fit: contain;
}

.module-title {
  color: #5b2330;
  font-size: 14px;
  font-weight: 700;
  text-transform: lowercase;
}

/* Main Wrapper */
.main-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0; /* Prevents flex item from blowing out */
}

/* Header Styles */
.top-header {
  height: 106px;
  background-color: rgba(247, 247, 247, 0.42);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 43px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.03);
}

.logo-container {
  display: flex;
  align-items: center;
}

.brand-logo {
  height: 42px;
  width: auto;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 26px;
}

.btn-achievements {
  background-color: rgba(255, 254, 245, 0.81);
  color: #5b2330;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  padding: 18px 24px;
  border-radius: 21px;
  box-shadow: 0px 4px 11.1px 3px rgba(122, 180, 213, 0.36);
  transition: background-color 0.2s ease, transform 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn-achievements:hover {
  background-color: #ffffff;
  transform: translateY(-1px);
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 17px;
  cursor: pointer;
}

.avatar-wrapper {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  border: 1px solid rgba(0, 0, 0, 0.35);
  box-shadow: 4px 4px 11.7px 0px rgba(217, 239, 255, 0.57);
  overflow: hidden;
  background-color: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.user-avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.user-name {
  color: #5b2330;
  font-size: 18px;
  font-weight: 700;
}

/* Content Area */
.content-area {
  flex: 1;
  background-color: #ffffff;
  /* Add padding here when content is added */
}

/* Responsive adjustments */
@media (max-width: 1024px) {
  .sidebar {
    width: 160px;
    padding-top: 100px;
  }
  .module-card {
    width: 140px;
  }
  .top-header {
    padding: 0 20px;
  }
}

@media (max-width: 768px) {
  .dashboard-container {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    height: auto;
    padding: 20px;
    flex-direction: row;
    overflow-x: auto;
  }
  .module-list {
    flex-direction: row;
    gap: 15px;
  }
  .top-header {
    flex-direction: column;
    height: auto;
    padding: 20px;
    gap: 20px;
  }
  .header-actions {
    width: 100%;
    justify-content: space-between;
  }
}
  </style>

</head>
