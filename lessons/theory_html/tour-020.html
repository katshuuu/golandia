<h2>Урок 20: Цикл for, продолжение</h2><p>Операторы init и post не являются обязательными.</p><p><strong>Пример для подростков:</strong> Представь, что листаешь плейлист до тех пор, пока не найдёшь трек для настроения: это и есть цикл.</p><p><strong>Немного юмора:</strong> Цикл без условия — как автоплей в 2 ночи: ты не хотел, но он продолжается.</p>
