<h2>Урок 45: Срезы срезов</h2><p>Срезы могут содержать любой тип, включая другие срезы.</p><p><strong>Пример для подростков:</strong> Срезы и карты можно представить как список дел и словарь никнеймов друзей в телефоне.</p><p><strong>Немного юмора:</strong> Если перепутал индекс и ключ — не переживай: это классический квест каждого новичка в Go.</p>
