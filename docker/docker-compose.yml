services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - COURSE_DATA_DIR=/app/data
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SANDBOX_MODE=docker
      - SANDBOX_IMAGE=go-llm-sandbox:latest
    volumes:
      - ../backend/data:/app/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - sandbox

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      - API_PROXY=http://backend:8080
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  sandbox:
    image: go-llm-sandbox:latest
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    command: ["sleep", "infinity"]
